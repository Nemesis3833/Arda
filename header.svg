<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <style>
    text { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 14px; dominant-baseline: middle; }
    @keyframes ln0 { 0%,0% { opacity: 0 } 2%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln1 { 0%,3% { opacity: 0 } 5%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln2 { 0%,6% { opacity: 0 } 8%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln3 { 0%,9% { opacity: 0 } 11%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln4 { 0%,12% { opacity: 0 } 14%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln5 { 0%,15% { opacity: 0 } 17%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes blink { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
    .ln0 { animation: ln0 12s ease-in-out infinite }
    .ln1 { animation: ln1 12s ease-in-out infinite }
    .ln2 { animation: ln2 12s ease-in-out infinite }
    .ln3 { animation: ln3 12s ease-in-out infinite }
    .ln4 { animation: ln4 12s ease-in-out infinite }
    .ln5 { animation: ln5 12s ease-in-out infinite }
  </style>
  <rect width="100%" height="100%" fill="#050505" rx="14" ry="14"/>
  <g opacity="0.5">
    <circle cx="24" cy="24" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="24" r="6" fill="#febc2e"/>
    <circle cx="64" cy="24" r="6" fill="#28c840"/>
  </g>
  <text x="400" y="28" fill="#4a4a4a" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">~ / readme</text>
  <g class="ln0" transform="translate(40 107)"><text fill="#a0c0e0">$</text><text x="20" fill="#e0e0e0">./identity --reveal</text></g>
  <g class="ln2" transform="translate(60 151)"><text fill="#4a4a4a">[</text><text x="6" fill="#a0c0e0">→</text><text x="20" fill="#4a4a4a">]</text><text x="40" fill="#4a4a4a">name</text><text x="160" fill="#e0e0e0">Arda Korkmaz</text></g>
  <g class="ln3" transform="translate(60 173)"><text fill="#4a4a4a">[</text><text x="6" fill="#a0c0e0">→</text><text x="20" fill="#4a4a4a">]</text><text x="40" fill="#4a4a4a">role</text><text x="160" fill="#e0e0e0">System Administrator</text></g>
  <g class="ln5" transform="translate(40 217)"><text fill="#a0c0e0">$</text><text x="20" fill="#e0e0e0">ready</text><rect x="78" y="-7" width="9" height="14" fill="#e0e0e0" style="animation: blink 1s steps(1) infinite" /></g>
</svg>