<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <style>
    text { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 14px; dominant-baseline: middle; }
    @keyframes ln0 { 0%,0% { opacity: 0 } 2%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln1 { 0%,4% { opacity: 0 } 6%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln2 { 0%,8% { opacity: 0 } 10%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln3 { 0%,12% { opacity: 0 } 14%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln4 { 0%,16% { opacity: 0 } 18%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln5 { 0%,20% { opacity: 0 } 22%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln6 { 0%,24% { opacity: 0 } 26%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes ln7 { 0%,28% { opacity: 0 } 30%,88% { opacity: 1 } 95%,100% { opacity: 0 } }
    @keyframes blink { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
    .ln0 { animation: ln0 12s ease-in-out infinite }
    .ln1 { animation: ln1 12s ease-in-out infinite }
    .ln2 { animation: ln2 12s ease-in-out infinite }
    .ln3 { animation: ln3 12s ease-in-out infinite }
    .ln4 { animation: ln4 12s ease-in-out infinite }
    .ln5 { animation: ln5 12s ease-in-out infinite }
    .ln6 { animation: ln6 12s ease-in-out infinite }
    .ln7 { animation: ln7 12s ease-in-out infinite }
  </style>
  <rect width="100%" height="100%" fill="#050505" rx="14" ry="14"/>
  <g opacity="0.5">
    <circle cx="24" cy="24" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="24" r="6" fill="#febc2e"/>
    <circle cx="64" cy="24" r="6" fill="#28c840"/>
  </g>
  <text x="400" y="28" fill="#4a4a4a" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">~ / about.md</text>
  <g class="ln0" transform="translate(40 68)"><text fill="#a0c0e0">$</text><text x="20" fill="#e0e0e0">cat ~/about.md</text></g>
  <g class="ln1" transform="translate(40 112)"><text fill="#4a4a4a"># </text><text x="22" fill="#e0e0e0">Hi, I&apos;m Arda Korkmaz</text></g>
  <g class="ln2" transform="translate(40 134)"><text fill="#a0c0e0">&gt;</text><text x="20" fill="#e0e0e0">I&apos;m a Systems Administrator passionate about infrastructure, automation, and the</text></g>
  <g class="ln3" transform="translate(40 156)"><text fill="#a0c0e0">&gt;</text><text x="20" fill="#e0e0e0">art of declarative configuration. When I&apos;m not managing systems, I&apos;m exploring the</text></g>
  <g class="ln4" transform="translate(40 178)"><text fill="#a0c0e0">&gt;</text><text x="20" fill="#e0e0e0">frontier of AI and Machine Learning.</text></g>
  <g class="ln5" transform="translate(40 222)"><text fill="#4a4a4a"># </text><text x="22" fill="#e0e0e0">tags</text></g>
  <g class="ln6" transform="translate(40 244)"><text fill="#4a4a4a">[ System Administrator ]</text></g>
  <g class="ln7" transform="translate(40 288)"><text fill="#a0c0e0">$</text><rect x="20" y="-7" width="9" height="14" fill="#e0e0e0" style="animation: blink 1s steps(1) infinite" /></g>
</svg>